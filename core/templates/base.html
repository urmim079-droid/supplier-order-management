<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SupplierOS{% endblock %} | Supplier Order Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
    <style>
        :root {
            --primary:      #8B3A3A;
            --primary-dark: #6e2e2e;
            --primary-light:#a84f4f;
            --accent:       #D05C35;
            --bg:           #F5EFEC;
            --sidebar-bg:   #7a3030;
            --sidebar-dark: #5c2424;
            --text-main:    #33211D;
            --text-muted:   #7a5f5a;
            --card-bg:      #FFFFFF;
            --border:       #e0d5d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-dark) 100%);
            border-right: 1px solid rgba(0,0,0,0.12);
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .sidebar-brand h2 {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .sidebar-brand span {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            font-weight: 400;
            margin-top: 3px;
        }

        .sidebar-nav { padding: 16px 12px; flex: 1; }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 8px;
            margin-bottom: 4px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }

        .sidebar-nav a svg { width: 16px; height: 16px; flex-shrink: 0; }

        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .sidebar-nav a.active {
            background: rgba(255,255,255,0.18);
            color: #fff;
            font-weight: 600;
        }

        /* ── Main ── */
        .main { margin-left: 240px; flex: 1; padding: 32px; }

        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 26px; font-weight: 700; color: var(--primary); }
        .page-header p  { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(139,58,58,0.06);
        }

        .card-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdf9f6;
        }

        .card-header h3 { font-size: 15px; font-weight: 600; color: var(--primary); }

        .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge-blue { background: rgba(139,58,58,0.1); color: var(--primary); }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; }

        thead th {
            padding: 12px 22px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: #fdf9f6;
        }

        tbody tr {
            border-top: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:hover { background: #fdf0eb; }

        tbody td {
            padding: 13px 22px;
            font-size: 14px;
            color: var(--text-main);
        }

        /* ── Status Pills ── */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .status-pill::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
        }
        .status-Pending   { background: rgba(208,92,53,0.12); color: #b84a1e; }
        .status-Pending::before   { background: #D05C35; }
        .status-Shipped   { background: rgba(139,58,58,0.12); color: var(--primary); }
        .status-Shipped::before   { background: var(--primary); }
        .status-Delivered { background: rgba(22,163,74,0.12); color: #15803d; }
        .status-Delivered::before { background: #16a34a; }

        /* ── Empty State ── */
        .empty-state {
            padding: 48px 22px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-brand">
        <h2>📦 SupplierOS</h2>
        <span>Order Management System</span>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a href="/" {% block nav_home %}{% endblock %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Home
        </a>
        <a href="/dashboard/" {% block nav_dashboard %}{% endblock %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Dashboard
        </a>
        <a href="/suppliers/" {% block nav_suppliers %}{% endblock %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Suppliers
        </a>
        <a href="/orders/" {% block nav_orders %}{% endblock %}>
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Orders
        </a>
    </div>
</nav>

<main class="main">
    {% block content %}{% endblock %}
</main>

{% block extra_scripts %}{% endblock %}
</body>
</html>
